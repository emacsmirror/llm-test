name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - 29.4
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install Eldev
        run: |
          curl -fsSL https://raw.githubusercontent.com/emacs-eldev/eldev/master/webinstall/github.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          emacs --version
          eldev version

      - name: Lint
        run: eldev lint

      - name: Compile
        run: eldev compile

      - name: Verify end-to-end test provider
        env:
          LLM_TEST_PROVIDER_ELISP: ${{ secrets.LLM_TEST_PROVIDER_ELISP }}
        run: |
          test -n "$LLM_TEST_PROVIDER_ELISP" || {
            echo "LLM_TEST_PROVIDER_ELISP secret is required for end-to-end llm-test scenarios."
            exit 1
          }

      - name: Test
        env:
          LLM_TEST_PROVIDER_ELISP: ${{ secrets.LLM_TEST_PROVIDER_ELISP }}
        run: eldev test
